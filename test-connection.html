<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>🔍 Connection Test</h1>
    <p>Test if your browser can connect to the SIGNAL server.</p>

    <div id="results"></div>

    <button onclick="testConnection()">Test API Connection (fetch)</button>
    <button onclick="testFormSubmission()">Test Form Submission (fetch)</button>
    <button onclick="testXHR()">Test API Connection (XMLHttpRequest)</button>
    <button onclick="clearResults()">Clear Results</button>

    <script>
        const results = document.getElementById('results');

        function addResult(message, isSuccess = true) {
            const div = document.createElement('div');
            div.className = 'test ' + (isSuccess ? 'success' : 'error');
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            results.appendChild(div);
        }

        async function testConnection() {
            try {
                addResult('Testing connection to /api/stats...');
                const response = await fetch('http://localhost:3000/api/stats');
                const data = await response.json();

                if (data.success) {
                    addResult('✅ SUCCESS: Connected! Total feedbacks: ' + data.data.total);
                } else {
                    addResult('❌ API Error: ' + data.error, false);
                }
            } catch (error) {
                addResult('❌ CONNECTION FAILED: ' + error.message, false);
                console.error('Connection error:', error);
            }
        }

        async function testFormSubmission() {
            try {
                addResult('Testing form submission...');
                const testData = {
                    name: 'Connection Test',
                    email: 'test@example.com',
                    rating: 5,
                    message: 'Testing browser connection',
                    category: 'General'
                };

                const response = await fetch('http://localhost:3000/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });

                const data = await response.json();

                if (data.success) {
                    addResult('✅ SUCCESS: Form submission worked! ID: ' + data.feedbackId);
                } else {
                    addResult('❌ API Error: ' + data.error, false);
                }
            } catch (error) {
                addResult('❌ FORM SUBMISSION FAILED: ' + error.message, false);
                console.error('Form submission error:', error);
            }
        }

        function testXHR() {
            addResult('Testing connection with XMLHttpRequest...');
            
            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'http://localhost:3000/api/stats', true);
            
            xhr.onload = function() {
                if (xhr.status === 200) {
                    const data = JSON.parse(xhr.responseText);
                    addResult('✅ SUCCESS: XMLHttpRequest works! Total: ' + data.data.total);
                } else {
                    addResult('❌ XHR Error: ' + xhr.status, false);
                }
            };
            
            xhr.onerror = function() {
                addResult('❌ XHR NETWORK ERROR: Cannot connect', false);
            };
            
            xhr.timeout = 5000;
            xhr.ontimeout = function() {
                addResult('❌ XHR TIMEOUT: Server not responding', false);
            };
            
            xhr.send();
        }

        function clearResults() {
            results.innerHTML = '';
        }

        // Auto-test on page load
        window.addEventListener('load', () => {
            addResult('Page loaded. Click buttons to test connection.');
        });
    </script>
</body>
</html>
